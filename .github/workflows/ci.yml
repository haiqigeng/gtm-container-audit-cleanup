name: Validate skill

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install validation dependencies
        run: python -m pip install -e ".[analysis,dev]"
      - name: Lint
        run: python -m ruff check --no-cache .
      - name: Unit tests
        run: python -B -m unittest discover -s tests -v
      - name: Integration self-test
        run: python -B scripts/gtm_self_test.py
      - name: Vendor registry
        run: python -B scripts/gtm_vendor_registry.py
      - name: Release structure
        run: python -B scripts/check_release.py
