name: Validate skill

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.11"
          - os: ubuntu-latest
            python-version: "3.12"
          - os: ubuntu-latest
            python-version: "3.13"
          - os: windows-latest
            python-version: "3.12"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install validation dependencies
        run: python -m pip install -e ".[analysis,dev]"
      - name: Lint
        run: python -m ruff check --no-cache .
      - name: Dead-code scan
        run: python -m vulture scripts tests --min-confidence 80
      - name: Integration self-test
        run: python -B scripts/gtm_self_test.py
      - name: Vendor registry
        run: python -B scripts/gtm_vendor_registry.py
      - name: Release structure
        run: python -B scripts/check_release.py
      - name: Compile Python sources
        run: python -B -m compileall -q scripts tests
      - name: Unit tests
        run: python -B -m coverage run --branch -m unittest discover -s tests -v
      - name: Coverage gate
        run: python -m coverage report --fail-under=72
