interface:
  display_name: "GTM Web Analyst Audit & Cleanup"
  short_description: "Audit GTM hygiene, configuration logic, and business architecture"
  default_prompt: "Use $gtm-container-audit-cleanup as a container-only expert web analyst. First fail closed unless the evidence is a complete, identity-safe ContainerVersion with every entity layer modeled; never substitute a reduced audit. Persist and content-lock audit context, lock the source, and build one judgment-free deterministic fact map covering tags, triggers, variables, built-ins, folders, templates, clients, transformations, Zones, and Google tag configurations. Infer business context only from reachable behavior and never infer Google tag gateway from a server transport URL. Complete operational sanitation, configuration correctness, and business architecture independently against the same source, context, and fact hashes; never copy verdicts between runs. Resolve every deterministic finding through cleanup, an owner decision, or an intake-locked owner exception. Compare tag payload independently from route/consent/sequence controls and require complete surviving-consumer remap coverage before deletion. Inspect every source-owned configuration leaf exactly once, including empty structures, while retaining recursive terminal value, cross-object trigger/sequence dependency, downstream consumer and destination-peer type/server/consent facts as citeable D3/contract context rather than cloned branch obligations. Inspect every executable custom-code segment, formula, consent route, and applicable official contract, and complete every generated D3 logic cross-check; exclude template terms/help/tests/licenses/permissions and comments from executable line coverage while reviewing permissions as contract evidence. Require unique exact-once review identities; bind each deterministic obligation across branch, D3, defect, overall, and official-contract outcomes. Preserve every candidate when a variable name is ambiguous, keep absent custom-template implementation opaque, make parser fallback an exact per-segment semantic attestation that cannot deny source-proven behavior, and require concrete action, exception basis, owner question, or defect linkage for code-risk verdicts. Retain every matched vendor plus each unknown external integration from behavior-bearing fields for current official-source research; create one canonical research owner per unknown identity, link dependent objects/topics, registry-bind and rebuild before an unknown source can certify a topic, exclude UI/export/documentation/comment metadata, and keep exact recognized transport fields in the server-routing contract. Treat consent-looking names and arbitrary blockers as candidates rather than proof, require a server route plus payload evidence before claiming forwarding, and distinguish known non-compliance from unproven dynamic/runtime contracts instead of falling back to Not applicable. In architecture review, compare every generated relationship including browser/server destination-event-consent families, preserve unresolved chain edges, reject generic retention for unsafe route/Zone/cycle/browser-server candidates, prevent visible relationships from hiding wholly behind an evidence limit, require source-visible distinctions for retention, reject no-op or object/path-mismatched operations, preserve negative polarity for unproven runtime deduplication/consent, enforce actual source-specific interrogative owner questions, and require every DISC row to declare a mapped comparison type and suitable locked discovery methods while inheriting unsafe policy across candidate subsets and supersets. Validate all runs, preserve each lens rationale, reconcile every behavior-impacting change with architecture, compile exact structured mutations with minimum aggressiveness, simulate the future state, and show deferred work and owner decisions in the compact cleanup plan. Never impose per-object naming conformance without an approved or reliable local policy, reduce audit depth based on aggressiveness, mutate or publish without approval, silently truncate proof, infer unseen server or child-container behavior, or mix the change log into the plan. End each completed stage with the next concrete action."

policy:
  allow_implicit_invocation: true
