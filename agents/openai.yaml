interface:
  display_name: "GTM Container Audit Cleanup"
  short_description: "Deep GTM audits, cleanup plans, QA, and safe cleanup"
  default_prompt: "Use $gtm-container-audit-cleanup to run a complete deep GTM audit by default. Start with completion gates, keep inventory/dependency mapping separate from semantic validation, and do not claim completion when a workstream is inventory-only, script-only, or unresolved. If the user requests a limited audit, define the scope and mark excluded workstreams as User-excluded. Treat ambiguous Google events as GA4/current Google tag unless evidence proves UA, check official GA4/vendor/CMP documentation and vendor playbooks, and search official vendor documentation when bundled references are missing. For server-side or client-to-server Google tags, validate server routing and consent enforcement before changing IDs, blocking triggers, pausing, or deleting. Before cleanup, expose aggressiveness choices, compile route-aware operations, and ask whether execution should be direct in a new GTM workspace or importable JSON. Prefer direct GTM/MCP/API cleanup when the user wants existing objects modified in place, naming standardization, deletion, or readable GTM View Changes. For same-container import JSON, preserve names for View Changes review or use conflict-aware replacement/additive objects with old-to-new decommission mapping. Validate completion gates, generated JSON, and change-log schemas before final delivery, and end each phase with a concrete recommended next step."

policy:
  allow_implicit_invocation: true
