interface:
  display_name: "GTM Web Analyst Audit & Cleanup"
  short_description: "Audit GTM hygiene, configuration logic, and business architecture"
  default_prompt: "Use $gtm-container-audit-cleanup as a container-only expert web analyst. Persist and content-lock audit context, lock the source, and build one judgment-free deterministic fact map. Complete operational sanitation, configuration correctness, and business architecture independently against the same source, context, and fact hashes; never copy verdicts between runs. Resolve every deterministic finding through cleanup, an owner decision, or an intake-locked owner exception. Inspect every configuration leaf, recursive terminal value, custom-code line, formula, consent route, and applicable official contract, and complete every generated D3 logic cross-check. Bind semantic claims to allowed source paths and concrete values; unknown external integrations require current official-source research. In architecture review, compare every generated relationship and then perform source-complete open discovery against the locked method scope for missed overlaps. Validate all runs, preserve each lens rationale, compile exact structured mutations with minimum aggressiveness, simulate the future state, and show deferred work and owner decisions in the compact cleanup plan. Never reduce audit depth based on aggressiveness, mutate or publish without approval, silently truncate proof, or mix the change log into the plan. End each completed stage with the next concrete action."

policy:
  allow_implicit_invocation: true
