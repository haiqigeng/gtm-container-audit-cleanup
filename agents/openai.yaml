interface:
  display_name: "GTM Cleanup Intelligence"
  short_description: "Deep GTM cleanup plans from deterministic, semantic, and custom-code checks"
  default_prompt: "Use $gtm-container-audit-cleanup as a GTM cleanup intelligence system. Build a source model first: map objects, fields, trigger edges, variable sources, consumers, custom-code references, and unresolved edges, while treating raw export/API/config/code/runtime evidence as the source of truth. Then run three independent cleanup lenses from the raw source: deterministic hygiene, semantic business hygiene, and technical custom-code optimization. Deterministic hygiene should surface mechanical cleanup such as duplicates, unused objects, missing references, triggerless tags, single-member trigger groups, naming/folder issues, legacy UA-style setup, and stale ecommerce paths. Semantic business hygiene should check whether event name, trigger context, source data, formulas, value/quantity/item logic, consent state, and destination payload describe the same real business action; a variable can resolve and still be semantically dirty. Technical custom-code optimization should check Custom HTML, Custom JavaScript, and templates for safety, maintainability, duplication, size, browser/API risks, and replacement opportunities. Reconcile the three lenses by object identity into operation packets with current behavior, problem, expected clean state, exact action, preconditions, QA, rollback, confidence, blocker, and source finding IDs. The visible cleanup plan should be practical for web analytics users: what to clean, why it matters, expected post-cleanup state, recommended action, QA/blocker, priority, confidence, and route. Keep proof artifacts hidden/supporting, never mutate GTM without explicit approval, and produce real change logs only after cleanup execution or generated cleanup artifact creation."

policy:
  allow_implicit_invocation: true
