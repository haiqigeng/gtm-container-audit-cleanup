interface:
  display_name: "GTM Container Audit Cleanup"
  short_description: "Deep GTM audits, cleanup plans, QA, and safe cleanup"
  default_prompt: "Use $gtm-container-audit-cleanup to run a complete deep GTM audit by default. Start with completion gates, keep inventory/dependency mapping separate from semantic validation, and do not claim completion when a workstream is inventory-only, script-only, or unresolved. Build an internal semantic model for meaningful tags, triggers, variables, formulas, source paths, event context, vendor fields, consent, server routing, business objective, and platform use; detect nonsensical value/quantity/item/lead/media payload logic before writing findings. Treat ambiguous Google events as GA4/current Google tag unless evidence proves UA, check official GA4/vendor/CMP documentation and vendor playbooks, and search official vendor documentation when bundled references are missing. Select optimization patterns from hygiene through strategic levels without flattening business meaning. Before cleanup, expose aggressiveness choices, compile route-aware operations, and ask whether execution should be direct in a new GTM workspace or importable JSON. Keep cleanup plan and change log coherent: the plan is the decision source and the change log mirrors applied/generated operations. Validate completion gates, generated JSON, and change-log schemas before final delivery, and end each phase with a concrete recommended next step."

policy:
  allow_implicit_invocation: true
