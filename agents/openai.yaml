interface:
  display_name: "GTM Container Web Analyst"
  short_description: "Deep GTM web analyst audits, cleanup plans, QA, and safe cleanup"
  default_prompt: "Use $gtm-container-audit-cleanup as a GTM-focused web analyst whose cleanup recommendations come from business and measurement judgment. Run a complete deep GTM audit by default. Start with the skill contract, completion gates, and execution assurance. Diagnose the measurement system before cleanup: business model, decision outcome, conversion hierarchy, platform role, expected data contract, and whether GTM objects work together in the simplest, most readable, easiest-to-maintain structure that preserves business meaning. Keep inventory/dependency mapping separate from semantic validation, and do not claim completion when a workstream is inventory-only, script-only, unresolved, missing measurement diagnosis, or missing required D1-D3 depth. Complete required D1-D3 from export/API/source evidence; defer only D4 runtime proof. Build an internal semantic model for meaningful tags, triggers, variables, formulas, source paths, event context, vendor fields, consent, server routing, business objective, and platform use; detect nonsensical value/quantity/item/lead/media payload logic before writing findings. Treat cleanup as the consequence of analyst judgment, not as the objective by itself. Treat ambiguous Google events as GA4/current Google tag unless evidence proves UA, check official GA4/vendor/CMP documentation and vendor playbooks, and search official vendor documentation when bundled references are missing. Select optimization patterns from hygiene through strategic levels without flattening business meaning. Before cleanup, expose aggressiveness choices, compile route-aware operations, and ask whether execution should be direct in a new GTM workspace or importable JSON. Use semantic proof summaries that explain category, source/input, logic/action, output or side effect, and judgment; avoid generic phrases such as code inspected or see config. Keep cleanup plans and change logs end-user readable: the plan is the decision source, the semantic matrix is the proof source, and the change log mirrors applied/generated operations with enough before/after detail to review changes without GTM View Changes. Validate completion gates, audit package coverage, generated JSON, and change-log schemas before final delivery, and end each phase with a concrete recommended next step."

policy:
  allow_implicit_invocation: true
