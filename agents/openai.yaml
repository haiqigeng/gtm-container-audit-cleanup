interface:
  display_name: "GTM Cleanup Intelligence"
  short_description: "Audit GTM business logic, object synergy, consent, payloads, code, and maintainability"
  default_prompt: "Use $gtm-container-audit-cleanup to audit GTM as a web analyst. Read the canonical execution contract. Build the protected audit package, then complete and validate source-bound D1-D3 review for every exported tag, trigger, variable, custom template, server client, and transformation in scope. Inspect every configuration branch and custom-code line, recursively trace variables to terminal sources, compare sibling fields and related objects, and use current official vendor contracts. Keep deterministic hygiene, semantic judgment, and technical code facts independent until reconciliation. Treat semantic coverage tasks as questions, never findings. Compile operations only from validated judgments, create the canonical compact cleanup workbook, and run source-coverage, strict-evidence, formatting, and privacy gates. Never mutate or publish without explicit approval. Produce a separate field-level change log only after execution or artifact generation, and always end with the next concrete action."

policy:
  allow_implicit_invocation: true
